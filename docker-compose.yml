version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: motionedit-backend
    environment:
      - MONGO_URL=${MONGO_URL:-}
      - UPLOADS_DIR=/app/uploads
    ports:
      - "8001:8001"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: motionedit-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  uploads_data:


